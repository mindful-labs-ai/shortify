<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shortify Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; }
      .stage-pill { font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body class="bg-neutral-50 text-neutral-900">
    <header class="sticky top-0 z-20 border-b border-neutral-200 bg-white/80 backdrop-blur">
      <div class="mx-auto flex max-w-7xl items-center gap-4 px-6 py-3">
        <h1 class="text-sm font-semibold tracking-tight">Shortify · Admin</h1>
        <input
          id="baseUrl"
          type="text"
          placeholder="Base URL — http://127.0.0.1:51234"
          class="w-72 rounded-md border border-neutral-300 px-2 py-1 text-xs"
        />
        <input
          id="token"
          type="password"
          placeholder="Bearer token"
          class="w-56 rounded-md border border-neutral-300 px-2 py-1 text-xs"
        />
        <button
          id="connectBtn"
          class="rounded-md bg-neutral-900 px-3 py-1 text-xs font-medium text-white"
        >
          Connect
        </button>
        <label class="ml-auto flex items-center gap-2 text-xs text-neutral-600">
          <input id="autoRefresh" type="checkbox" checked />
          Auto refresh (3s)
        </label>
        <span id="status" class="rounded-full bg-neutral-200 px-2 py-0.5 text-[11px]">Idle</span>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-6 py-6">
      <!-- Top stat bar -->
      <section id="stats" class="mb-6 grid grid-cols-2 gap-4 md:grid-cols-5">
        <!-- filled by JS -->
      </section>

      <!-- Config / health -->
      <section
        id="config"
        class="mb-6 rounded-2xl border border-neutral-200 bg-white p-4 text-xs text-neutral-600"
      ></section>

      <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">
        <!-- Jobs -->
        <section class="rounded-2xl border border-neutral-200 bg-white">
          <div class="flex items-center justify-between border-b border-neutral-200 px-4 py-2">
            <h2 class="text-sm font-medium">Jobs (latest 50)</h2>
            <span id="jobsCount" class="text-xs text-neutral-500"></span>
          </div>
          <div id="jobs" class="max-h-[640px] divide-y divide-neutral-100 overflow-auto text-sm"></div>
        </section>

        <!-- Right column: queue + events -->
        <div class="flex flex-col gap-6">
          <section class="rounded-2xl border border-neutral-200 bg-white">
            <div class="flex items-center justify-between border-b border-neutral-200 px-4 py-2">
              <h2 class="text-sm font-medium">Queue (latest 30)</h2>
              <span id="queueCount" class="text-xs text-neutral-500"></span>
            </div>
            <div id="queue" class="max-h-[300px] divide-y divide-neutral-100 overflow-auto text-xs"></div>
          </section>

          <section class="rounded-2xl border border-neutral-200 bg-white">
            <div class="flex items-center justify-between border-b border-neutral-200 px-4 py-2">
              <h2 class="text-sm font-medium">Events (latest 100)</h2>
              <span id="eventsCount" class="text-xs text-neutral-500"></span>
            </div>
            <div id="events" class="max-h-[400px] divide-y divide-neutral-100 overflow-auto text-xs"></div>
          </section>
        </div>
      </div>
    </main>

    <script>
      const STAGE_LABEL = {
        "-1": "Failed",
        0: "Queued",
        1: "Extracting",
        2: "Conceptizing",
        3: "Awaiting img",
        4: "Imaging",
        5: "Clipping",
        6: "Narrating",
        7: "Aligning",
        8: "Composing",
        9: "Done",
      };
      const STAGE_COLOR = {
        "-1": "bg-rose-100 text-rose-700",
        0: "bg-neutral-100 text-neutral-700",
        9: "bg-emerald-100 text-emerald-700",
      };
      function stageColor(s) {
        if (STAGE_COLOR[s]) return STAGE_COLOR[s];
        if (s >= 1 && s <= 3) return "bg-amber-100 text-amber-700";
        if (s >= 4) return "bg-sky-100 text-sky-700";
        return "bg-neutral-100 text-neutral-700";
      }

      const $ = (id) => document.getElementById(id);
      const baseUrlInput = $("baseUrl");
      const tokenInput = $("token");
      const statusEl = $("status");
      const autoRefreshEl = $("autoRefresh");

      // localStorage
      baseUrlInput.value = localStorage.getItem("shortify.admin.baseUrl") || "";
      tokenInput.value = localStorage.getItem("shortify.admin.token") || "";

      $("connectBtn").addEventListener("click", () => {
        localStorage.setItem("shortify.admin.baseUrl", baseUrlInput.value.trim());
        localStorage.setItem("shortify.admin.token", tokenInput.value.trim());
        refresh();
      });

      let timer = null;
      autoRefreshEl.addEventListener("change", scheduleAutoRefresh);

      function scheduleAutoRefresh() {
        if (timer) clearInterval(timer);
        if (autoRefreshEl.checked) timer = setInterval(refresh, 3000);
      }

      async function refresh() {
        const baseUrl = baseUrlInput.value.trim();
        const token = tokenInput.value.trim();
        if (!baseUrl || !token) {
          statusEl.textContent = "Need URL + token";
          statusEl.className = "rounded-full bg-amber-200 px-2 py-0.5 text-[11px]";
          return;
        }
        try {
          const res = await fetch(`${baseUrl}/admin/state`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          render(data);
          statusEl.textContent = `OK ${new Date().toLocaleTimeString()}`;
          statusEl.className = "rounded-full bg-emerald-200 px-2 py-0.5 text-[11px]";
        } catch (e) {
          statusEl.textContent = `Err: ${e.message}`;
          statusEl.className = "rounded-full bg-rose-200 px-2 py-0.5 text-[11px]";
        }
      }

      function render(d) {
        // Stats
        const c = d.queue.counts;
        $("stats").innerHTML = [
          ["Pending", c.pending, "bg-neutral-100"],
          ["Running", c.running, "bg-amber-100"],
          ["Done", c.done, "bg-emerald-100"],
          ["Failed", c.failed, "bg-rose-100"],
          ["Total jobs", d.jobs.length, "bg-sky-100"],
        ]
          .map(
            ([label, n, cls]) =>
              `<div class="rounded-2xl ${cls} p-4">
                 <div class="text-[11px] uppercase tracking-wider text-neutral-500">${label}</div>
                 <div class="mt-1 text-2xl font-semibold tabular-nums">${n}</div>
               </div>`,
          )
          .join("");

        // Config
        const cfg = d.config;
        $("config").innerHTML = `
          <div class="grid grid-cols-2 gap-2 md:grid-cols-3">
            <div><span class="text-neutral-400">data_dir:</span> <code>${cfg.data_dir}</code></div>
            <div><span class="text-neutral-400">workers:</span> ${cfg.n_workers}</div>
            <div><span class="text-neutral-400">gemini key:</span>
              <span class="${cfg.gemini_key_set ? "text-emerald-700" : "text-rose-700"}">
                ${cfg.gemini_key_set ? "set ✓" : "MISSING"}
              </span>
            </div>
            <div><span class="text-neutral-400">text:</span> ${cfg.model_text}</div>
            <div><span class="text-neutral-400">image:</span> ${cfg.model_image}</div>
            <div><span class="text-neutral-400">video:</span> ${cfg.model_video}</div>
            <div><span class="text-neutral-400">tts:</span> ${cfg.model_tts}</div>
            <div><span class="text-neutral-400">audio:</span> ${cfg.model_audio}</div>
          </div>`;

        // Jobs
        $("jobsCount").textContent = `${d.jobs.length} rows`;
        $("jobs").innerHTML = d.jobs
          .map((j) => {
            const label = STAGE_LABEL[j.stage] ?? `stage ${j.stage}`;
            const color = stageColor(j.stage);
            return `
              <div class="px-4 py-3 ${j.deleted_at ? "opacity-50" : ""}">
                <div class="flex items-start gap-3">
                  <span class="stage-pill mt-0.5 inline-block w-24 shrink-0 rounded-full ${color} px-2 py-0.5 text-center text-[11px] font-medium">${label}</span>
                  <div class="min-w-0 flex-1">
                    <div class="truncate font-medium">${escapeHtml(j.title || "")}</div>
                    <div class="mt-0.5 truncate text-xs text-neutral-500">
                      <code class="text-[10px]">${j.id}</code>
                      ${j.concept ? ` · ${j.concept}` : ""}
                      ${j.duration_ms ? ` · ${(j.duration_ms / 1000).toFixed(1)}s` : ""}
                      ${j.deleted_at ? " · 🗑 trashed" : ""}
                    </div>
                    ${
                      j.error
                        ? `<div class="mt-1 line-clamp-2 text-xs text-rose-600">${escapeHtml(j.error)}</div>`
                        : j.stage_message
                          ? `<div class="mt-1 truncate text-xs text-neutral-600">${escapeHtml(j.stage_message)}</div>`
                          : ""
                    }
                  </div>
                </div>
              </div>`;
          })
          .join("") || `<div class="px-4 py-8 text-center text-xs text-neutral-400">No jobs yet</div>`;

        // Queue
        $("queueCount").textContent = `${d.queue.recent.length} rows`;
        $("queue").innerHTML = d.queue.recent
          .map((t) => {
            const statusColor = {
              pending: "bg-neutral-100 text-neutral-700",
              running: "bg-amber-100 text-amber-700",
              done: "bg-emerald-100 text-emerald-700",
              failed: "bg-rose-100 text-rose-700",
            }[t.status] || "bg-neutral-100 text-neutral-700";
            return `
              <div class="px-4 py-2">
                <div class="flex items-center gap-2">
                  <span class="inline-block w-16 rounded-full ${statusColor} px-2 py-0.5 text-center text-[10px] font-medium">${t.status}</span>
                  <span class="font-medium">${t.type}</span>
                  <span class="text-neutral-400">#${t.id}</span>
                  <span class="text-neutral-400">attempt ${t.attempts}/${t.max_attempts}</span>
                  ${t.worker_id ? `<span class="text-neutral-400">${t.worker_id}</span>` : ""}
                </div>
                ${t.error ? `<div class="mt-1 line-clamp-1 text-rose-600">${escapeHtml(t.error)}</div>` : ""}
              </div>`;
          })
          .join("") || `<div class="px-4 py-8 text-center text-xs text-neutral-400">empty</div>`;

        // Events
        $("eventsCount").textContent = `${d.events.length} rows`;
        $("events").innerHTML = d.events
          .map((e) => {
            const t = new Date(e.created_at).toLocaleTimeString();
            const label = STAGE_LABEL[e.stage] ?? `stage ${e.stage}`;
            const color = stageColor(e.stage);
            return `
              <div class="flex items-start gap-3 px-4 py-1.5">
                <span class="w-16 shrink-0 text-[10px] tabular-nums text-neutral-400">${t}</span>
                <span class="inline-block w-20 shrink-0 rounded-full ${color} px-1.5 py-0.5 text-center text-[10px] font-medium">${label}</span>
                <span class="truncate text-neutral-600"><code class="text-[10px] text-neutral-400">${e.job_id.slice(0, 6)}</code> ${escapeHtml(e.message || "")}</span>
              </div>`;
          })
          .join("") || `<div class="px-4 py-8 text-center text-xs text-neutral-400">no events</div>`;
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
        })[c]);
      }

      // Boot
      if (baseUrlInput.value && tokenInput.value) refresh();
      scheduleAutoRefresh();
    </script>
  </body>
</html>
